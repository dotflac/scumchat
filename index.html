<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WEECHAT_RELAY | Terminal Editorial</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "error": "#fd6f85",
            "surface-variant": "#222438",
            "primary": "#cdb1ff",
            "primary-dim": "#b393ef",
            "on-error": "#490013",
            "secondary": "#aec6ff",
            "error-dim": "#c8475d",
            "on-surface-variant": "#a8a9c3",
            "error-container": "#8a1632",
            "surface-container-low": "#11121f",
            "secondary-fixed-dim": "#c4d4ff",
            "primary-fixed-dim": "#c4a3ff",
            "primary-fixed": "#cfb4ff",
            "on-primary-container": "#3d1b72",
            "on-primary-fixed-variant": "#523389",
            "on-tertiary-container": "#422476",
            "on-secondary": "#003d8a",
            "primary-container": "#c1a0fe",
            "outline": "#72748b",
            "secondary-fixed": "#d8e2ff",
            "secondary-container": "#002357",
            "surface-tint": "#cdb1ff",
            "tertiary-fixed-dim": "#bb9cf5",
            "on-primary": "#47277d",
            "on-tertiary-fixed-variant": "#4c2e7f",
            "on-background": "#e3e3ff",
            "surface-bright": "#282a41",
            "on-surface": "#e3e3ff",
            "surface": "#0c0d18",
            "surface-container-lowest": "#000000",
            "on-secondary-container": "#7ba3f8",
            "secondary-dim": "#7fa7fd",
            "tertiary-dim": "#b394ec",
            "inverse-surface": "#fbf8ff",
            "inverse-on-surface": "#545461",
            "tertiary-container": "#c8aaff",
            "surface-container-high": "#1c1e30",
            "on-tertiary-fixed": "#2b065f",
            "surface-container": "#171827",
            "on-tertiary": "#4c2f80",
            "surface-dim": "#0c0d18",
            "on-secondary-fixed": "#003c88",
            "tertiary": "#d4bbff",
            "background": "#0c0d18",
            "inverse-primary": "#6d4ea5",
            "on-secondary-fixed-variant": "#2c59a9",
            "surface-container-highest": "#222438",
            "on-error-container": "#ff97a3",
            "tertiary-fixed": "#c8aaff",
            "on-primary-fixed": "#340f69",
            "outline-variant": "#44465c"
          },
          fontFamily: {
            "headline": ["Space Grotesk"],
            "body": ["Space Grotesk"],
            "label": ["Space Grotesk"],
            "mono": ["JetBrains Mono", "monospace"]
          },
          borderRadius: {"DEFAULT": "0px", "lg": "0px", "xl": "0px", "full": "9999px"},
        },
      },
    }
  </script>
  
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0c0d18; }
    ::-webkit-scrollbar-thumb { background: #282a41; }
    ::-webkit-scrollbar-thumb:hover { background: #cdb1ff; }
    body { cursor: default; }
  </style>
</head>
<body class="bg-surface text-on-surface font-body overflow-hidden">
  
  <!-- Connection Modal -->
  <div id="connect-modal" class="fixed inset-0 z-[100] flex items-center justify-center bg-surface-container-highest/85 backdrop-blur-[10px] hidden">
    <div class="bg-surface border border-outline-variant/30 w-96 flex flex-col">
      <div class="bg-surface-container-highest px-4 py-2 border-b border-outline-variant/30">
        <span class="text-primary font-bold text-sm tracking-widest uppercase">Connect to Relay</span>
      </div>
      <div class="p-6 flex flex-col gap-4">
        <div class="flex gap-3">
          <div class="flex flex-col gap-1 flex-1">
            <label class="text-xs uppercase tracking-widest text-on-surface-variant font-mono">Host</label>
            <input type="text" id="input-host" class="bg-surface-container-lowest border border-outline-variant/20 focus:border-secondary focus:ring-0 text-on-surface font-mono text-sm px-3 py-2" value="scum.ltd" />
          </div>
          <div class="flex flex-col gap-1 w-24">
            <label class="text-xs uppercase tracking-widest text-on-surface-variant font-mono">Port</label>
            <input type="text" id="input-port" class="bg-surface-container-lowest border border-outline-variant/20 focus:border-secondary focus:ring-0 text-on-surface font-mono text-sm px-3 py-2" value="54321" />
          </div>
        </div>
        <div class="flex items-center gap-2">
          <input type="checkbox" id="input-encryption" class="bg-surface-container-lowest border border-outline-variant/30 text-primary focus:ring-0 focus:ring-offset-0 w-4 h-4" checked />
          <label for="input-encryption" class="text-xs uppercase tracking-widest text-on-surface-variant font-mono cursor-pointer">Enable Encryption (WSS)</label>
        </div>
        <div class="flex flex-col gap-1">
          <label class="text-xs uppercase tracking-widest text-on-surface-variant font-mono">Password</label>
          <input type="password" id="input-password" class="bg-surface-container-lowest border border-outline-variant/20 focus:border-secondary focus:ring-0 text-on-surface font-mono text-sm px-3 py-2" placeholder="Relay password" />
        </div>
        <div id="connect-error" class="text-error text-[10px] font-mono uppercase hidden"></div>
        <button id="btn-connect" class="mt-2 bg-primary text-on-primary py-2 font-bold uppercase tracking-widest text-sm hover:bg-primary-container transition-colors">Connect</button>
      </div>
    </div>
  </div>

  <!-- Main Layout Container -->
  <main class="flex h-screen pb-8">
    <!-- SideNavBar (Left: Buffer List) -->
    <aside class="w-64 flex flex-col bg-[#11121f] border-r border-outline-variant/10">
      <div class="p-4 flex flex-col gap-1">
        <div class="flex justify-between items-center mb-2">
          <span class="text-[#cdb1ff] font-bold uppercase tracking-widest font-['Space_Grotesk'] text-[10px]">BUFFERS</span>
          <span id="buffer-count" class="text-[#a8a9c3] font-['Space_Grotesk'] text-[10px]">0 ACTIVE</span>
        </div>
        
        <!-- Buffer List Container -->
        <div id="buffer-list" class="flex flex-col gap-0.5 overflow-y-auto min-h-0">
          <!-- Dynamically populated -->
        </div>
      </div>
      
      <div class="mt-auto p-4 flex gap-2">
        <div class="flex items-center justify-between w-full border-t border-outline-variant/10 pt-4">
          <button class="p-1 text-[#b393ef] hover:bg-[#282a41] transition-colors duration-150" title="Terminal">
            <span class="material-symbols-outlined text-base">terminal</span>
          </button>
          <button class="p-1 text-[#7fa7fd] hover:bg-[#282a41] transition-colors duration-150" title="Settings">
            <span class="material-symbols-outlined text-base">settings</span>
          </button>
          <button id="btn-reconnect" class="p-1 text-[#b393ef] hover:bg-[#282a41] transition-colors duration-150" title="Sync Status">
            <span class="material-symbols-outlined text-base">sync</span>
          </button>
          <button class="p-1 text-[#7fa7fd] hover:bg-[#282a41] transition-colors duration-150" title="Help">
            <span class="material-symbols-outlined text-base">help_outline</span>
          </button>
        </div>
      </div>
    </aside>
    
    <!-- Right Side (Header + Content Area) -->
    <div class="flex-1 flex flex-col overflow-hidden">
      <!-- Buffer Header -->
      <header class="bg-[#171827] px-6 py-3 border-b border-outline-variant/10 flex flex-col gap-0.5 w-full">
        <div class="flex items-center gap-2">
          <span id="header-title" class="font-mono text-primary font-bold">#status</span>
          <span id="header-type" class="text-[10px] bg-secondary-container text-secondary px-1.5 py-0.5 rounded-full font-bold">CORE</span>
        </div>
        <div id="header-topic" class="font-mono text-[11px] text-on-surface-variant truncate">
          <span class="text-secondary opacity-80">Topic:</span> Not connected.
        </div>
      </header>
      
      <!-- Main content area split into Chat and Nick List -->
      <div class="flex flex-1 overflow-hidden">
        <!-- Center (Chat Buffer) -->
        <section class="flex-1 flex flex-col bg-surface overflow-hidden relative">
          <div id="chat-messages" class="flex-1 overflow-y-auto p-6 font-mono text-sm leading-relaxed flex flex-col gap-2">
            <!-- Dynamically populated -->
          </div>
          
          <!-- Command Input -->
          <div class="bg-surface-container-lowest border-t border-outline-variant border-opacity-10 px-4 flex items-center gap-3 min-h-0 py-1.5">
            <div class="flex items-center gap-2 w-full">
              <span id="input-prompt" class="font-mono text-secondary/60 text-sm font-bold flex-shrink-0">&lt;&gt;</span>
              <input id="chat-input" class="bg-transparent border-none focus:ring-0 text-on-surface font-mono text-sm w-full p-0 placeholder:text-outline-variant/40" placeholder="Type a command or message..." type="text" autocomplete="off" spellcheck="false" />
              <div class="flex gap-2 flex-shrink-0">
                <span class="material-symbols-outlined text-outline-variant text-sm cursor-pointer hover:text-secondary">mood</span>
              </div>
            </div>
          </div>
        </section>
        
        <!-- Right (Nick List) -->
        <aside class="w-48 bg-surface-container-low flex flex-col border-l border-outline-variant/10">
          <div class="p-3 border-b border-outline-variant border-opacity-10">
            <span id="nick-count" class="font-mono text-[10px] text-on-surface-variant tracking-widest uppercase">Users: 0</span>
          </div>
          <div id="nick-list" class="overflow-y-auto p-2 font-mono text-xs flex flex-col gap-1">
            <!-- Dynamically populated -->
          </div>
        </aside>
      </div>
    </div>
    
    <!-- Footer (Status Bar) -->
    <footer class="fixed bottom-0 left-0 w-full z-50 flex items-center justify-between px-4 bg-[#000000] h-8 border-t border-outline-variant/10">
      <div class="flex gap-4">
        <span id="status-time" class="font-mono text-[10px] tracking-widest uppercase text-[#aec6ff] cursor-default">[--:--]</span>
        <span id="status-lag" class="font-mono text-[10px] tracking-widest uppercase text-[#aec6ff] cursor-default">lag: --ms</span>
        <span id="status-nick" class="font-mono text-[10px] tracking-widest uppercase text-[#aec6ff] cursor-default hover:text-[#e3e3ff]">nick: --</span>
        <span id="status-active" class="font-mono text-[10px] tracking-widest uppercase text-[#d4bbff] cursor-default">--</span>
      </div>
      <div class="flex gap-4">
        <span id="status-version" class="font-mono text-[10px] tracking-widest uppercase text-[#aec6ff] cursor-default">WEERELAY v1.0.0</span>
      </div>
    </footer>
  </main>
  
  <!-- App Scripts -->
  <script src="js/store.js"></script>
  <script src="js/protocol.js"></script>
  <script src="js/relay.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
